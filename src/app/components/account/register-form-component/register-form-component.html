<div class="container">
    <div class="dialog-header">
        <button matButton="outlined" (click)="close()">
            <mat-icon class="close">close</mat-icon>
            Close
        </button>
    </div>

    <iframe
        title="Google Form"
        [src]="formUrl"
        (load)="onLoad()"
        width="100%" 
        height="100%"
        frameBorder="0">
    </iframe>

    <app-loader-component *ngIf="isLoading"></app-loader-component>
</div>
